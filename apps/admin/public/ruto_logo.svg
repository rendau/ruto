<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="ring" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#23D5C8"/>
      <stop offset="100%" stop-color="#5B6EEA"/>
    </linearGradient>
    <linearGradient id="swoosh" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4F7BEF"/>
      <stop offset="100%" stop-color="#20D5C8"/>
    </linearGradient>
  </defs>

  <!-- Ring -->
  <circle cx="256" cy="256" r="150"
          fill="none"
          stroke="url(#ring)"
          stroke-width="42"
          stroke-linecap="round"/>

  <!-- Upper swoosh -->
  <path d="
      M 40 270
      C 120 330, 240 315, 350 250
      C 420 210, 470 180, 500 175
      C 445 170, 390 182, 320 215
      C 220 262, 120 300, 40 270 Z"
      fill="url(#swoosh)"/>

  <!-- Lower swoosh -->
  <path d="
      M 65 315
      C 135 355, 235 345, 330 285
      C 295 312, 250 340, 195 352
      C 145 362, 100 352, 65 315 Z"
      fill="url(#swoosh)"/>
</svg>
