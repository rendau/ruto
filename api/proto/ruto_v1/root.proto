syntax = "proto3";

package ruto_v1;

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/struct.proto";
import "ruto_v1/common.proto";

option go_package = "/ruto_v1";

service Root {
  rpc Get(google.protobuf.Empty) returns (google.protobuf.Struct) {
    option (google.api.http) = { get: "/root" };
  };
  rpc Set(google.protobuf.Struct) returns (google.protobuf.Empty) {
    option (google.api.http) = { post: "/root" body: "*" };
  };
  rpc GetJwtKidsByUrls(RootJwtKidsReq) returns (RootJwtKidsRep) {
    option (google.api.http) = { get: "/root/jwt/kids/by-urls" };
  };
  rpc GetVariablesEffective(RootVariablesEffectiveReq) returns (VariablesEffectiveRep) {
    option (google.api.http) = { post: "/root/variables/effective" body: "*" };
  };
}

message RootJwtKidsRep {
  repeated string kids = 1;
}

message RootJwtKidsReq {
  repeated string urls = 1;
}

message RootVariablesEffectiveReq {
  repeated google.protobuf.Struct variables = 1;
}
