syntax = "proto3";

package ruto_v1;

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "ruto_v1/auth.proto";
import "ruto_v1/common.proto";

option go_package = "/ruto_v1";

service Root {
  rpc Get(google.protobuf.Empty) returns (RootMain) {
    option (google.api.http) = { get: "/root" };
  };
  rpc Set(RootMain) returns (google.protobuf.Empty) {
    option (google.api.http) = { post: "/root" body: "*" };
  };
  rpc GetJwtKidsByUrls(RootJwtKidsReq) returns (RootJwtKidsRep) {
    option (google.api.http) = { get: "/root/jwt/kids/by-urls" };
  };
  rpc GetVariablesEffective(RootVariablesEffectiveReq) returns (VariablesEffectiveRep) {
    option (google.api.http) = { post: "/root/variables/effective" body: "*" };
  };
}

message RootMain {
  string base_url = 1;
  RootCors cors = 2;
  repeated RootJwt jwt = 3;
  Auth auth = 4;
  repeated Variable variables = 5;
}

// children

message RootCors {
  bool enabled = 1;
  bool allow_credentials = 2;
  string max_age = 3;
  repeated string allow_origins = 4;
  repeated string allow_methods = 5;
  repeated string allow_headers = 6;
}

message RootJwt {
  string jwk_url = 1;
}

message RootJwtKidsRep {
  repeated string kids = 1;
}

message RootJwtKidsReq {
  repeated string urls = 1;
}

message RootVariablesEffectiveReq {
  repeated Variable variables = 1;
}
