syntax = "proto3";

package ruto_v1;

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "ruto_v1/auth.proto";
import "ruto_v1/common.proto";

option go_package = "/ruto_v1";

service App {
  rpc List(AppListReq) returns (AppListRep) {
    option (google.api.http) = { get: "/app" };
  };
  rpc Get(AppGetReq) returns (AppMain) {
    option (google.api.http) = { get: "/app/{id}" };
  };
  rpc Create(AppMain) returns (AppCreateRep) {
    option (google.api.http) = { post: "/app" body: "*" };
  };
  rpc Update(AppMain) returns (google.protobuf.Empty) {
    option (google.api.http) = { put: "/app/{id}" body: "*" };
  };
  rpc Delete(AppGetReq) returns (google.protobuf.Empty) {
    option (google.api.http) = { delete: "/app/{id}" };
  };
  rpc GetSwaggerEndpointsDiff(AppGetReq) returns (AppSwaggerEndpointsDiffRep) {
    option (google.api.http) = { get: "/app/{id}/swagger/endpoints-diff" };
  };
  rpc GetGrpcReflectionEndpoints(AppGetReq) returns (AppGrpcReflectionEndpointsRep) {
    option (google.api.http) = { get: "/app/{id}/grpc/reflection/endpoints" };
  };
  rpc GetSwaggerUrlByBackendUrl(AppGetSwaggerUrlByBackendUrlReq) returns (AppGetSwaggerUrlByBackendUrlRep) {
    option (google.api.http) = { get: "/app/swagger/url/by-backend-url" };
  };
  rpc GetVariablesEffective(AppVariablesEffectiveReq) returns (VariablesEffectiveRep) {
    option (google.api.http) = { post: "/app/variables/effective" body: "*" };
  };
}

message AppMain {
  string id = 1;
  bool active = 2;
  string path_prefix = 3;
  string name = 4;
  AppBackend backend = 5;
  Auth auth = 6;
  repeated Variable variables = 7;
}

message AppGetReq {
  string id = 1;
}

message AppListReq {
  ListParamsSt list_params = 1;
  optional bool active = 2;
}

message AppListRep {
  PaginationInfoSt pagination_info = 1;
  repeated AppMain results = 2;
}

message AppCreateRep {
  string id = 1;
}

message AppBackend {
  string url = 1;
  string swagger_url = 2;
  uint32 grpc_port = 3;
  map<string, string> headers = 4;
  map<string, string> query_params = 5;
}

message AppSwaggerEndpoint {
  string method = 1;
  string path = 2;
}

message AppSwaggerEndpointsDiffRep {
  repeated AppSwaggerEndpoint unregistered = 1;
  repeated AppSwaggerEndpoint registered_invalid = 2;
}

message AppGrpcReflectionEndpoint {
  string service = 1;
  string method = 2;
  string path = 3;
}

message AppGrpcReflectionEndpointsRep {
  repeated AppGrpcReflectionEndpoint results = 1;
}

message AppGetSwaggerUrlByBackendUrlReq {
  string backend_url = 1;
}

message AppGetSwaggerUrlByBackendUrlRep {
  string swagger_url = 1;
}

message AppVariablesEffectiveReq {
  string id = 1;
  repeated Variable variables = 2;
}
