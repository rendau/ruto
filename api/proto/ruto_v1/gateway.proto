syntax = "proto3";

package ruto_v1;

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";

option go_package = "/ruto_v1";

service Gateway {
  rpc Heartbeat(GatewayHeartbeatRequest) returns (google.protobuf.Empty);
  rpc List(google.protobuf.Empty) returns (GatewayListResponse) {
    option (google.api.http) = { get: "/gateway" };
  };
  // Subscribe opens a long-lived server stream. The gateway keeps it open and
  // core pushes notifications (e.g. "check snapshot version now") through it,
  // making config propagation instant instead of poll-driven.
  rpc Subscribe(GatewaySubscribeRequest) returns (stream GatewayNotification);
}

message GatewaySubscribeRequest {
  string gateway_id = 1;
}

message GatewayNotification {
  // type of notification, e.g. "check_version".
  string type = 1;
}

message GatewayHeartbeatRequest {
  string gateway_id = 1;
  reserved 3;
  string host_name = 5;
  string snapshot_version = 6;
  int64 last_apply_at_unix = 7;
  int64 started_at_unix = 8;
  string last_error = 9;
  uint64 memory_alloc_bytes = 10;
  uint32 goroutines_count = 11;
}

message GatewayListResponse {
  repeated GatewayStateItem results = 1;
}

message GatewayStateItem {
  string gateway_id = 1;
  reserved 3;
  string host_name = 5;
  string snapshot_version = 6;
  int64 last_apply_at_unix = 7;
  int64 started_at_unix = 8;
  string last_error = 9;
  int64 last_seen_at_unix = 10;
  string status = 11;
  uint64 memory_alloc_bytes = 12;
  uint32 goroutines_count = 13;
}
