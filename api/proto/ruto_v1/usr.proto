syntax = "proto3";

package ruto_v1;

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "ruto_v1/common.proto";

option go_package = "/ruto_v1";

service Usr {
  rpc List(UsrListReq) returns (UsrListRep) {
    option (google.api.http) = { get: "/usr" };
  };
  rpc Get(UsrGetReq) returns (UsrMain) {
    option (google.api.http) = { get: "/usr/{id}" };
  };
  rpc Create(UsrCreate) returns (UsrCreateRep) {
    option (google.api.http) = { post: "/usr" body: "*" };
  };
  rpc Update(UsrEdit) returns (google.protobuf.Empty) {
    option (google.api.http) = { put: "/usr/{id}" body: "*" };
  };
  rpc Delete(UsrGetReq) returns (google.protobuf.Empty) {
    option (google.api.http) = { delete: "/usr/{id}" };
  };
  rpc Login(UsrLoginReq) returns (UsrLoginRep) {
    option (google.api.http) = { post: "/usr/login" body: "*" };
  };
  rpc BootstrapStatus(google.protobuf.Empty) returns (UsrBootstrapStatusRep) {
    option (google.api.http) = { get: "/usr/bootstrap/status" };
  };
  rpc GetProfile(google.protobuf.Empty) returns (UsrMain) {
    option (google.api.http) = { get: "/usr/profile" };
  };
  rpc UpdateProfile(UsrUpdateProfileReq) returns (google.protobuf.Empty) {
    option (google.api.http) = { put: "/usr/profile" body: "*" };
  };
}

message UsrMain {
  int64 id = 1;
  bool active = 2;
  bool is_admin = 3;
  string name = 4;
  string username = 5;
  string password = 6;
  bool all_apps = 7;
  repeated string app_ids = 8;
}

message UsrCreate {
  optional bool active = 1;
  optional bool is_admin = 2;
  optional string name = 3;
  optional string username = 4;
  optional string password = 5;
  optional bool all_apps = 6;
  repeated string app_ids = 7;
}

message UsrEdit {
  int64 id = 1;
  optional bool active = 2;
  optional bool is_admin = 3;
  optional string name = 4;
  optional string username = 5;
  optional string password = 6;
  optional bool all_apps = 7;
  bool update_app_ids = 8;
  repeated string app_ids = 9;
}

message UsrGetReq {
  int64 id = 1;
}

message UsrListReq {
  ListParamsSt list_params = 1;
  optional string search = 2;
}

message UsrListRep {
  PaginationInfoSt pagination_info = 1;
  repeated UsrMain results = 2;
}

message UsrCreateRep {
  int64 id = 1;
}

message UsrLoginReq {
  string username = 1;
  string password = 2;
}

message UsrLoginRep {
  string jwt = 1;
}

message UsrBootstrapStatusRep {
  bool can_create_first_admin = 1;
}

message UsrUpdateProfileReq {
  optional string name = 1;
  optional string password = 2;
}
