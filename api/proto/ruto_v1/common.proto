syntax = "proto3";

package ruto_v1;

option go_package = "/ruto_v1";

message ListParamsSt {
  int64 page = 2;
  int64 page_size = 3;
  bool with_total_count = 4;
  bool only_count = 5;
  string sort_name = 6;
  repeated string sort = 7;
}

message PaginationInfoSt {
  int64 page = 1;
  int64 page_size = 2;
  int64 total_count = 3;
}

message ErrorRep {
  string code = 1;
  string message = 2;
  map<string, string> fields = 3;
}
