syntax = "proto3";

package ruto_v1;

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "ruto_v1/auth.proto";
import "ruto_v1/common.proto";

option go_package = "/ruto_v1";

service Endpoint {
  rpc List(EndpointListReq) returns (EndpointListRep) {
    option (google.api.http) = { get: "/endpoint" };
  };
  rpc Get(EndpointGetReq) returns (EndpointMain) {
    option (google.api.http) = { get: "/endpoint/{id}" };
  };
  rpc Create(EndpointMain) returns (EndpointCreateRep) {
    option (google.api.http) = { post: "/endpoint" body: "*" };
  };
  rpc Update(EndpointMain) returns (google.protobuf.Empty) {
    option (google.api.http) = { put: "/endpoint/{id}" body: "*" };
  };
  rpc Delete(EndpointGetReq) returns (google.protobuf.Empty) {
    option (google.api.http) = { delete: "/endpoint/{id}" };
  };
}

message EndpointMain {
  string id = 1;
  string app_id = 2;
  bool active = 3;
  string method = 4;
  string path = 5;
  EndpointBackend backend = 6;
  Auth auth = 7;
}

message EndpointGetReq {
  string id = 1;
}

message EndpointListReq {
  ListParamsSt list_params = 1;
  optional string app_id = 2;
  optional bool active = 3;
}

message EndpointListRep {
  PaginationInfoSt pagination_info = 1;
  repeated EndpointMain results = 2;
}

message EndpointCreateRep {
  string id = 1;
}

message EndpointBackend {
  string custom_path = 1;
}
