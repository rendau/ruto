syntax = "proto3";

package ruto_v1;

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/struct.proto";
import "ruto_v1/common.proto";

option go_package = "/ruto_v1";

service Endpoint {
  rpc List(EndpointListReq) returns (EndpointListRep) {
    option (google.api.http) = { get: "/endpoint" };
  };
  rpc Get(EndpointGetReq) returns (google.protobuf.Struct) {
    option (google.api.http) = { get: "/endpoint/{id}" };
  };
  rpc Interpolate(EndpointInterpolateReq) returns (google.protobuf.Struct) {
    option (google.api.http) = { post: "/endpoint/{id}/interpolate" body: "*" };
  };
  rpc Inherited(EndpointInheritedReq) returns (google.protobuf.Struct) {
    option (google.api.http) = { post: "/endpoint/{id}/inherited" body: "*" };
  };
  rpc Create(google.protobuf.Struct) returns (EndpointCreateRep) {
    option (google.api.http) = { post: "/endpoint" body: "*" };
  };
  rpc Update(EndpointUpdateReq) returns (google.protobuf.Empty) {
    option (google.api.http) = { put: "/endpoint/{id}" body: "data" };
  };
  rpc Delete(EndpointGetReq) returns (google.protobuf.Empty) {
    option (google.api.http) = { delete: "/endpoint/{id}" };
  };
}

message EndpointUpdateReq {
  string id = 1;
  google.protobuf.Struct data = 2;
}

message EndpointGetReq {
  string id = 1;
}

message EndpointInterpolateReq {
  string id = 1;
  map<string, string> variables = 2;
}

message EndpointInheritedReq {
  string id = 1;
  map<string, string> variables = 2;
}

message EndpointListReq {
  ListParamsSt list_params = 1;
  optional string app_id = 2;
  optional bool active = 3;
}

message EndpointListRep {
  PaginationInfoSt pagination_info = 1;
  repeated google.protobuf.Struct results = 2;
}

message EndpointCreateRep {
  string id = 1;
}
